<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swimming Pool Amanat Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f9ff;
            -webkit-tap-highlight-color: transparent;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-exit { animation: slideOut 0.3s ease-out forwards; }
        .fade-in { animation: fadeIn 0.2s ease-out forwards; }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 10px; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col relative">

    <nav class="bg-blue-600 text-white shadow-lg sticky top-0 z-40 no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 md:gap-3">
                    <i class="fa-solid fa-water text-xl md:text-2xl"></i>
                    <span class="font-bold text-lg md:text-xl tracking-wide truncate">Amanat Tracker Pro</span>
                </div>
                <div class="text-xs md:text-sm bg-blue-700 px-3 py-1.5 rounded-full border border-blue-500 shadow-inner flex items-center shrink-0">
                    <i class="fa-solid fa-clock mr-1.5"></i> <span id="currentTime"></span>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col md:flex-row gap-6 no-print">
        
        <!-- Left Column: Statistics and Form -->
        <div class="w-full md:w-1/3 space-y-6">
            
            <!-- Statistics Cards -->
            <div class="grid grid-cols-2 gap-3 md:gap-4">
                <div class="bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-blue-100 flex flex-col justify-center items-center text-center">
                    <p class="text-[10px] md:text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Mojooda (Active)</p>
                    <p id="activeCount" class="text-2xl md:text-3xl font-black text-blue-600">0</p>
                </div>
                <div class="bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-center items-center text-center">
                    <p class="text-[10px] md:text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Wapas Shuda</p>
                    <p id="returnedCount" class="text-2xl md:text-3xl font-black text-slate-600">0</p>
                </div>
            </div>

            <div class="bg-white p-5 md:p-6 rounded-2xl shadow-md border border-blue-100 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-400 to-blue-600"></div>
                <h2 class="text-lg md:text-xl font-bold text-blue-800 mb-4 border-b border-blue-50 pb-2">
                    <i class="fa-solid fa-plus-circle mr-2"></i>Nayi Amanat 
                </h2>
                
                <form id="amanatForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Token / Locker No. *</label>
                        <input type="text" id="tokenNo" required placeholder="Maslan: L-12" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all uppercase text-base">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Grahak ka Naam</label>
                        <input type="text" id="customerName" placeholder="Naam..." class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all capitalize text-base">
                    </div>

                    <!-- Photo Upload Section -->
                    <div class="grid grid-cols-2 gap-3">
                        <!-- Customer Photo -->
                        <div>
                            <label class="block text-[11px] md:text-xs font-bold text-slate-500 uppercase tracking-wider mb-1 text-center">Grahak ki Tasveer</label>
                            <div class="relative w-full aspect-square border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 hover:bg-slate-100 flex items-center justify-center cursor-pointer overflow-hidden group" onclick="document.getElementById('customerImgInput').click()">
                                <input type="file" id="customerImgInput" accept="image/*" capture="environment" class="hidden" onchange="processImage(this, 'customerImgPreview', 'customerImgBase64', 'customerPlaceholder')">
                                <img id="customerImgPreview" src="" class="hidden w-full h-full object-cover">
                                <div id="customerPlaceholder" class="text-center text-slate-400 group-hover:text-blue-500 transition-colors pointer-events-none">
                                    <i class="fa-solid fa-camera text-xl md:text-2xl mb-1"></i><br><span class="text-xs font-medium">Tap to Capture</span>
                                </div>
                            </div>
                            <input type="hidden" id="customerImgBase64">
                        </div>
                        
                        <!-- Item Photo -->
                        <div>
                            <label class="block text-[11px] md:text-xs font-bold text-slate-500 uppercase tracking-wider mb-1 text-center">Samaan ki Tasveer</label>
                            <div class="relative w-full aspect-square border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 hover:bg-slate-100 flex items-center justify-center cursor-pointer overflow-hidden group" onclick="document.getElementById('itemImgInput').click()">
                                <input type="file" id="itemImgInput" accept="image/*" capture="environment" class="hidden" onchange="processImage(this, 'itemImgPreview', 'itemImgBase64', 'itemPlaceholder')">
                                <img id="itemImgPreview" src="" class="hidden w-full h-full object-cover">
                                <div id="itemPlaceholder" class="text-center text-slate-400 group-hover:text-blue-500 transition-colors pointer-events-none">
                                    <i class="fa-solid fa-camera text-xl md:text-2xl mb-1"></i><br><span class="text-xs font-medium">Tap to Capture</span>
                                </div>
                            </div>
                            <input type="hidden" id="itemImgBase64">
                        </div>
                    </div>
                    <div class="text-right mt-1">
                        <button type="button" onclick="clearImages()" class="text-xs text-red-500 hover:text-red-700 font-medium"> <i class="fa-solid fa-trash-can mr-1"></i> Tasveerein Hatayen</button>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Amanat ki Tafseel *</label>
                        <textarea id="itemsDesc" required rows="2" placeholder="Maslan: 1 Mobile, Bike Keys..." class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none text-base"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 transform active:scale-[0.98] text-lg">
                        <i class="fa-solid fa-box-archive"></i> Mehfooz Karein
                    </button>
                </form>
            </div>
        </div>

        <!-- Note: h-auto on mobile allows scrolling naturally, while md:h-[calc...] sets a fixed height on desktop -->
        <div class="w-full md:w-2/3 flex flex-col h-[600px] md:h-[calc(100vh-8rem)]">
            <div class="bg-white rounded-2xl shadow-md border border-blue-100 flex flex-col h-full overflow-hidden">
                
                <!-- Search & Tabs -->
                <div class="p-3 md:p-4 border-b border-slate-200 bg-slate-50 space-y-3 md:space-y-4 shrink-0">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-search text-slate-400"></i>
                        </div>
                        <input type="text" id="searchInput" placeholder="Talaash karein..." class="w-full pl-10 pr-4 py-2.5 md:py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm text-base">
                    </div>
                    
                    <div class="flex gap-2 items-center justify-between">
                        <div class="flex gap-2 flex-1">
                            <button id="tabActive" class="flex-1 py-2 px-2 md:px-4 rounded-lg font-bold text-sm bg-blue-600 text-white shadow-sm transition-colors">
                                Active
                            </button>
                            <button id="tabHistory" class="flex-1 py-2 px-2 md:px-4 rounded-lg font-semibold text-sm bg-slate-200 text-slate-600 hover:bg-slate-300 transition-colors">
                                History
                            </button>
                        </div>
                        <button id="clearHistoryBtn" onclick="openClearHistoryModal()" class="hidden shrink-0 text-red-500 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors text-sm font-medium">
                            <i class="fa-solid fa-trash-can md:mr-1"></i> <span class="hidden md:inline">Clear</span>
                        </button>
                    </div>
                </div>

                <div id="amanatList" class="flex-1 p-3 md:p-4 overflow-y-auto space-y-3 md:space-y-4 bg-slate-50">
                    <!-- Cards injected here -->
                </div>
            </div>
        </div>
    </main>

    <div id="printArea" class="hidden bg-white text-black max-w-sm mx-auto border border-dashed border-gray-400 rounded-lg">
        <div class="text-center mb-4">
            <h1 class="text-xl font-bold border-b-2 border-black inline-block pb-1">AMANAT TOKEN</h1>
            <p class="text-xs mt-1 text-gray-600" id="printDate"></p>
        </div>
        
        <div class="flex justify-center gap-2 mb-4" id="printImagesContainer">
            <!-- Images injected here if they exist -->
        </div>

        <div class="space-y-3 text-sm md:text-base">
            <div class="flex justify-between border-b border-gray-200 pb-1">
                <span class="font-bold">Token/Locker:</span>
                <span id="printToken" class="font-black text-lg"></span>
            </div>
            <div class="flex justify-between border-b border-gray-200 pb-1">
                <span class="font-bold">Name:</span>
                <span id="printName"></span>
            </div>
            <div>
                <span class="font-bold block mb-1">Items:</span>
                <p id="printItems" class="bg-gray-100 p-2 rounded"></p>
            </div>
        </div>
        <div class="mt-6 text-center text-xs text-gray-500 border-t border-gray-300 pt-2">
            <p>Please keep this receipt safe.</p>
        </div>
    </div>

    <!-- Image Lightbox Modal -->
    <div id="lightboxModal" class="fixed inset-0 bg-black/90 hidden z-[60] flex items-center justify-center p-4 fade-in" onclick="closeLightbox()">
        <button class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300 z-[70] w-12 h-12 flex items-center justify-center bg-black/50 rounded-full" onclick="closeLightbox()">&times;</button>
        <img id="lightboxImage" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl" onclick="event.stopPropagation()">
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-end md:items-center justify-center p-0 md:p-4 fade-in">
        <div class="bg-white rounded-t-3xl md:rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all flex flex-col max-h-[90vh]">
            <div class="bg-blue-600 p-4 text-white flex justify-between items-center shrink-0">
                <h3 class="font-bold text-lg"><i class="fa-solid fa-pen-to-square mr-2"></i>Edit Amanat</h3>
                <button onclick="closeEditModal()" class="text-blue-100 hover:text-white p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="overflow-y-auto p-5 md:p-6 flex-1">
                <form id="editForm" class="space-y-4">
                    <input type="hidden" id="editId">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Token / Locker No.</label>
                        <input type="text" id="editTokenNo" required class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 uppercase text-base">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Grahak ka Naam</label>
                        <input type="text" id="editCustomerName" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 capitalize text-base">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1 text-center">Grahak</label>
                            <div class="relative w-full aspect-square border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 flex items-center justify-center cursor-pointer overflow-hidden" onclick="document.getElementById('editCustomerImgInput').click()">
                                <input type="file" id="editCustomerImgInput" accept="image/*" capture="environment" class="hidden" onchange="processImage(this, 'editCustomerImgPreview', 'editCustomerImgBase64', 'editCustomerPlaceholder')">
                                <img id="editCustomerImgPreview" src="" class="hidden w-full h-full object-cover">
                                <div id="editCustomerPlaceholder" class="text-center text-slate-400">
                                    <i class="fa-solid fa-camera text-xl"></i>
                                </div>
                            </div>
                            <input type="hidden" id="editCustomerImgBase64">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1 text-center">Samaan</label>
                            <div class="relative w-full aspect-square border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 flex items-center justify-center cursor-pointer overflow-hidden" onclick="document.getElementById('editItemImgInput').click()">
                                <input type="file" id="editItemImgInput" accept="image/*" capture="environment" class="hidden" onchange="processImage(this, 'editItemImgPreview', 'editItemImgBase64', 'editItemPlaceholder')">
                                <img id="editItemImgPreview" src="" class="hidden w-full h-full object-cover">
                                <div id="editItemPlaceholder" class="text-center text-slate-400">
                                    <i class="fa-solid fa-camera text-xl"></i>
                                </div>
                            </div>
                            <input type="hidden" id="editItemImgBase64">
                        </div>
                    </div>
                    <button type="button" onclick="clearEditImages()" class="w-full text-xs text-red-500 font-medium">Clear Images</button>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Amanat ki Tafseel</label>
                        <textarea id="editItemsDesc" required rows="2" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 resize-none text-base"></textarea>
                    </div>
                    <div class="flex gap-3 pt-4">
                        <button type="button" onclick="closeEditModal()" class="flex-1 bg-slate-100 text-slate-700 py-3 rounded-xl font-medium hover:bg-slate-200 transition-colors">Cancel</button>
                        <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors">Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden text-center p-6 transform transition-all scale-100">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">Delete Karein?</h3>
            <p class="text-slate-500 mb-6 text-sm" id="deleteModalText">Ye record delete ho jayega.</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 bg-slate-100 text-slate-700 py-3 rounded-xl font-medium hover:bg-slate-200 transition-colors">Cancel</button>
                <button id="confirmDeleteBtn" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold hover:bg-red-600 transition-colors shadow-sm shadow-red-200">Delete</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-4 left-4 right-4 md:left-auto md:right-4 z-50 flex flex-col gap-2 no-print pointer-events-none"></div>

    <script>
        let deposits = JSON.parse(localStorage.getItem('amanat_deposits')) || [];
        let currentTab = 'active'; 
        let currentDeleteId = null;
        let isClearingHistory = false;

        function saveDeposits() {
            try {
                localStorage.setItem('amanat_deposits', JSON.stringify(deposits));
            } catch(e) {
                console.error("Storage full or error", e);
            }
        }

        function updateLastToken(tokenStr) {
            let num = parseInt(tokenStr.replace(/[^0-9]/g, ''));
            if (!isNaN(num)) {
                let lastToken = parseInt(localStorage.getItem('amanat_last_token')) || 0;
                if (num >= lastToken) {
                    localStorage.setItem('amanat_last_token', num);
                }
            }
        }

        function setNextToken() {
            let lastToken = parseInt(localStorage.getItem('amanat_last_token')) || 0;
            document.getElementById('tokenNo').value = 'L-' + (lastToken + 1);
        }

        const timeEl = document.getElementById('currentTime');
        function updateTime() {
            const now = new Date();
            timeEl.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            let icon = type === 'success' ? 'fa-check-circle text-green-500' : 
                       type === 'error' ? 'fa-circle-xmark text-red-500' : 'fa-info-circle text-blue-500';
            let bgColor = type === 'success' ? 'bg-green-50 border-green-200' : 
                          type === 'error' ? 'bg-red-50 border-red-200' : 'bg-blue-50 border-blue-200';
            
            toast.className = `flex items-center gap-3 p-3 md:p-4 rounded-xl shadow-lg border ${bgColor} toast-enter w-full md:min-w-[250px] md:max-w-sm pointer-events-auto`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-xl"></i><p class="text-slate-800 font-medium text-sm md:text-base">${message}</p>`;
            
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Compresses image to max 800px width/height and outputs Base64
        function processImage(input, previewId, base64Id, placeholderId) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX = 800;

                    if (width > height && width > MAX) {
                        height *= MAX / width; width = MAX;
                    } else if (height > MAX) {
                        width *= MAX / height; height = MAX;
                    }

                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // 60% quality compression
                    
                    document.getElementById(base64Id).value = dataUrl;
                    const preview = document.getElementById(previewId);
                    preview.src = dataUrl;
                    preview.classList.remove('hidden');
                    document.getElementById(placeholderId).classList.add('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function clearImages() {
            ['customer', 'item'].forEach(type => {
                document.getElementById(`${type}ImgInput`).value = '';
                document.getElementById(`${type}ImgBase64`).value = '';
                document.getElementById(`${type}ImgPreview`).src = '';
                document.getElementById(`${type}ImgPreview`).classList.add('hidden');
                document.getElementById(`${type}Placeholder`).classList.remove('hidden');
            });
        }

        function clearEditImages() {
            ['editCustomer', 'editItem'].forEach(type => {
                document.getElementById(`${type}ImgInput`).value = '';
                document.getElementById(`${type}ImgBase64`).value = '';
                document.getElementById(`${type}ImgPreview`).src = '';
                document.getElementById(`${type}ImgPreview`).classList.add('hidden');
                document.getElementById(`${type}Placeholder`).classList.remove('hidden');
            });
        }

        window.openLightbox = function(imgSrc) {
            document.getElementById('lightboxImage').src = imgSrc;
            document.getElementById('lightboxModal').classList.remove('hidden');
        }
        window.closeLightbox = function() {
            document.getElementById('lightboxModal').classList.add('hidden');
        }

        document.getElementById('amanatForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const tokenNo = document.getElementById('tokenNo').value.trim().toUpperCase();
            const customerName = document.getElementById('customerName').value.trim() || 'Na-maloom';
            const itemsDesc = document.getElementById('itemsDesc').value.trim();
            const customerImg = document.getElementById('customerImgBase64').value;
            const itemImg = document.getElementById('itemImgBase64').value;

            if (deposits.some(d => d.tokenNo === tokenNo && d.status === 'active')) {
                showToast(`Token "${tokenNo}" pehle se active hai!`, 'error');
                return;
            }

            deposits.push({
                id: Date.now().toString(),
                tokenNo, customerName, items: itemsDesc,
                customerImg, itemImg,
                timeIn: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                dateIn: new Date().toLocaleDateString(),
                status: 'active', timeOut: null
            });

            updateLastToken(tokenNo);
            saveDeposits();
            this.reset();
            clearImages();
            setNextToken();
            document.getElementById('tokenNo').focus();
            showToast(`Token ${tokenNo} mehfooz ho gaya!`, 'success');
            
            if(currentTab !== 'active') switchTab('active');
            renderDeposits();
        });

        const listContainer = document.getElementById('amanatList');
        const searchInput = document.getElementById('searchInput');

        function renderDeposits() {
            const term = searchInput.value.toLowerCase();
            const filtered = deposits.filter(dep => 
                dep.status === currentTab && 
                (dep.tokenNo.toLowerCase().includes(term) || dep.customerName.toLowerCase().includes(term))
            );

            document.getElementById('activeCount').innerText = deposits.filter(d => d.status === 'active').length;
            document.getElementById('returnedCount').innerText = deposits.filter(d => d.status === 'returned').length;
            listContainer.innerHTML = '';

            if (filtered.length === 0) {
                listContainer.innerHTML = `<div class="flex flex-col items-center justify-center h-48 text-slate-400">
                        <i class="fa-solid fa-box-open text-4xl mb-2 opacity-50"></i><p>List khali hai.</p></div>`;
                return;
            }

            filtered.slice().reverse().forEach(dep => {
                const card = document.createElement('div');
                card.className = `p-3 md:p-4 rounded-xl shadow-sm border bg-white flex flex-col lg:flex-row gap-3 md:gap-4 transition-all ${dep.status === 'returned' ? 'border-slate-200 opacity-80' : 'border-blue-200 border-l-4 border-l-blue-500'}`;
                
                const timeBadge = dep.status === 'active' 
                    ? `<span class="text-[10px] md:text-xs text-blue-700 bg-blue-50 px-2 py-1 rounded-md font-bold"><i class="fa-regular fa-clock"></i> ${dep.timeIn}</span>`
                    : `<span class="text-[10px] md:text-xs text-slate-600 bg-slate-100 px-2 py-1 rounded-md font-bold"><i class="fa-solid fa-check"></i> ${dep.timeOut}</span>`;

                // Handle Images for Card
                const custImgHtml = dep.customerImg 
                    ? `<img src="${dep.customerImg}" onclick="openLightbox('${dep.customerImg}')" class="w-10 h-10 md:w-12 md:h-12 rounded-full object-cover border border-slate-200 cursor-pointer shadow-sm">` 
                    : `<div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-400"><i class="fa-solid fa-user"></i></div>`;
                
                const itemImgHtml = dep.itemImg 
                    ? `<img src="${dep.itemImg}" onclick="openLightbox('${dep.itemImg}')" class="w-10 h-10 md:w-12 md:h-12 rounded-lg object-cover border border-slate-200 cursor-pointer shadow-sm">` 
                    : `<div class="w-10 h-10 md:w-12 md:h-12 rounded-lg bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-400"><i class="fa-solid fa-box"></i></div>`;

                card.innerHTML = `
                    <div class="flex-1 flex gap-3">
                        <div class="flex flex-col gap-2 shrink-0 pt-1">
                            ${custImgHtml}
                            ${itemImgHtml}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex flex-wrap items-center gap-2 mb-1">
                                <span class="bg-slate-800 text-white font-bold px-2.5 py-0.5 rounded text-xs md:text-sm tracking-wide">
                                    <i class="fa-solid fa-ticket text-slate-300"></i> ${dep.tokenNo}
                                </span>
                                <span class="font-bold text-slate-800 text-sm md:text-base capitalize truncate max-w-[120px] md:max-w-none">${dep.customerName}</span>
                                ${timeBadge}
                            </div>
                            <p class="text-slate-600 text-xs md:text-sm mb-1 bg-slate-50 p-2 rounded border border-slate-100 break-words">
                                <span class="font-semibold text-slate-700 text-[10px] uppercase block mb-0.5">Items:</span> 
                                ${dep.items}
                            </p>
                            <div class="text-[10px] text-slate-400 font-medium"><i class="fa-regular fa-calendar"></i> ${dep.dateIn}</div>
                        </div>
                    </div>
                    
                    <div class="shrink-0 flex gap-2 lg:flex-col justify-end border-t lg:border-t-0 pt-2 lg:pt-0 border-slate-100">
                        <div class="flex gap-1.5 flex-1 lg:flex-none justify-end">
                            <button onclick="printReceipt('${dep.id}')" class="w-9 h-9 md:w-10 md:h-10 rounded bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-slate-200"><i class="fa-solid fa-print"></i></button>
                            ${dep.status === 'active' ? `
                                <button onclick="openEditModal('${dep.id}')" class="w-9 h-9 md:w-10 md:h-10 rounded bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-100"><i class="fa-solid fa-pen"></i></button>
                            ` : ''}
                            <button onclick="openDeleteModal('${dep.id}')" class="w-9 h-9 md:w-10 md:h-10 rounded bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-100"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        ${dep.status === 'active' ? `
                            <button onclick="returnAmanat('${dep.id}')" class="flex-1 lg:flex-none bg-green-500 text-white font-bold py-2 px-3 md:px-5 rounded shadow-sm hover:bg-green-600 text-sm flex items-center justify-center gap-1.5">
                                <i class="fa-solid fa-hand-holding-hand"></i> Wapas
                            </button>
                        ` : `
                            <div class="flex-1 lg:flex-none text-slate-500 text-xs font-bold flex items-center justify-center gap-1 bg-slate-100 py-2 px-3 rounded border border-slate-200">
                                <i class="fa-solid fa-check-circle"></i> Wapas Shuda
                            </div>
                        `}
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            const actCls = "flex-1 py-2 px-2 md:px-4 rounded-lg font-bold text-sm bg-blue-600 text-white shadow-sm transition-colors";
            const inactCls = "flex-1 py-2 px-2 md:px-4 rounded-lg font-semibold text-sm bg-slate-200 text-slate-600 hover:bg-slate-300 transition-colors";
            
            document.getElementById('tabActive').className = tab === 'active' ? actCls : inactCls;
            document.getElementById('tabHistory').className = tab === 'history' ? actCls : inactCls;
            document.getElementById('clearHistoryBtn').className = tab === 'history' ? "shrink-0 text-red-500 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors text-sm font-medium" : "hidden";
            
            renderDeposits();
        }

        document.getElementById('tabActive').addEventListener('click', () => switchTab('active'));
        document.getElementById('tabHistory').addEventListener('click', () => switchTab('history'));
        searchInput.addEventListener('input', renderDeposits);

        window.returnAmanat = function(id) {
            const index = deposits.findIndex(d => d.id === id);
            if (index !== -1) {
                deposits[index].status = 'returned';
                deposits[index].timeOut = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                saveDeposits();
                showToast(`Token ${deposits[index].tokenNo} wapas kar diya gaya!`, 'info');
                renderDeposits();
            }
        };

        window.printReceipt = function(id) {
            const dep = deposits.find(d => d.id === id);
            if(!dep) return;
            
            document.getElementById('printToken').innerText = dep.tokenNo;
            document.getElementById('printName').innerText = dep.customerName;
            document.getElementById('printItems').innerText = dep.items;
            document.getElementById('printDate').innerText = `${dep.dateIn} at ${dep.timeIn}`;
            
            const imgContainer = document.getElementById('printImagesContainer');
            imgContainer.innerHTML = '';
            if(dep.customerImg) imgContainer.innerHTML += `<img src="${dep.customerImg}" class="w-20 h-20 object-cover border border-gray-300 rounded">`;
            if(dep.itemImg) imgContainer.innerHTML += `<img src="${dep.itemImg}" class="w-20 h-20 object-cover border border-gray-300 rounded">`;

            window.print();
        }

        window.openEditModal = function(id) {
            const dep = deposits.find(d => d.id === id);
            if(!dep) return;

            document.getElementById('editId').value = dep.id;
            document.getElementById('editTokenNo').value = dep.tokenNo;
            document.getElementById('editCustomerName').value = dep.customerName;
            document.getElementById('editItemsDesc').value = dep.items;
            
            clearEditImages();
            if(dep.customerImg) {
                document.getElementById('editCustomerImgBase64').value = dep.customerImg;
                const prev = document.getElementById('editCustomerImgPreview');
                prev.src = dep.customerImg;
                prev.classList.remove('hidden');
                document.getElementById('editCustomerPlaceholder').classList.add('hidden');
            }
            if(dep.itemImg) {
                document.getElementById('editItemImgBase64').value = dep.itemImg;
                const prev = document.getElementById('editItemImgPreview');
                prev.src = dep.itemImg;
                prev.classList.remove('hidden');
                document.getElementById('editItemPlaceholder').classList.add('hidden');
            }

            document.getElementById('editModal').classList.remove('hidden');
        };

        window.closeEditModal = () => document.getElementById('editModal').classList.add('hidden');

        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const tokenNo = document.getElementById('editTokenNo').value.trim().toUpperCase();
            const index = deposits.findIndex(d => d.id === id);
            
            if (index !== -1) {
                if (deposits.some(d => d.id !== id && d.tokenNo === tokenNo && d.status === 'active')) {
                    showToast(`Token "${tokenNo}" pehle se active hai!`, 'error');
                    return;
                }

                deposits[index].tokenNo = tokenNo;
                deposits[index].customerName = document.getElementById('editCustomerName').value.trim();
                deposits[index].items = document.getElementById('editItemsDesc').value.trim();
                deposits[index].customerImg = document.getElementById('editCustomerImgBase64').value;
                deposits[index].itemImg = document.getElementById('editItemImgBase64').value;
                
                updateLastToken(tokenNo);
                saveDeposits();
                showToast('Record update ho gaya!', 'success');
                closeEditModal();
                renderDeposits();
            }
        });

        window.openDeleteModal = function(id) {
            currentDeleteId = id;
            isClearingHistory = false;
            document.getElementById('deleteModalText').innerText = "Ye akela record delete ho jayega.";
            document.getElementById('deleteModal').classList.remove('hidden');
        };

        window.openClearHistoryModal = function() {
            if(!deposits.some(d => d.status === 'returned')) return showToast('History khali hai.', 'info');
            isClearingHistory = true;
            document.getElementById('deleteModalText').innerText = "Tamam Wapas Shuda records hamesha ke liye delete ho jayenge.";
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        window.closeDeleteModal = () => {
            document.getElementById('deleteModal').classList.add('hidden');
            currentDeleteId = null;
        };

        document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
            if (isClearingHistory) {
                deposits = deposits.filter(d => d.status !== 'returned');
                showToast('History clear ho gayi!', 'success');
            } else if (currentDeleteId) {
                deposits = deposits.filter(d => d.id !== currentDeleteId);
                showToast('Record delete ho gaya!', 'success');
            }
            saveDeposits();
            closeDeleteModal();
            renderDeposits();
        });

        renderDeposits();
        setNextToken();
    </script>
</body>
</html>
